name: Unraid Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Tidy Go modules
        run: cd src && go mod tidy

      - name: Build Slackware package
        run: |
          chmod +x unraid/build.sh
          ./unraid/build.sh "${{ steps.version.outputs.version }}"

      - name: Resolve package paths
        id: pkgfiles
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="packages/${VERSION}/nvidia-smi-exporter-${VERSION}-x86_64-1"
          echo "tgz=${PKG}.tgz" >> "$GITHUB_OUTPUT"
          echo "md5=${PKG}.md5" >> "$GITHUB_OUTPUT"
          echo "md5val=$(cat "${PKG}.md5")" >> "$GITHUB_OUTPUT"

      - name: Update .plg with version and MD5
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MD5="${{ steps.pkgfiles.outputs.md5val }}"
          sed -i "s|<!ENTITY version     \"[^\"]*\">|<!ENTITY version     \"${VERSION}\">|" unraid/nvidia-smi-exporter.plg
          sed -i "s|<!ENTITY md5         \"[^\"]*\">|<!ENTITY md5         \"${MD5}\">|" unraid/nvidia-smi-exporter.plg

      - name: Commit updated .plg to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add unraid/nvidia-smi-exporter.plg
          git diff --cached --quiet || git commit -m "chore: update .plg to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## nvidia-smi-exporter ${{ github.ref_name }}

            ### Unraid Installation
            Install via Community Applications or add the plugin URL directly:
            ```
            https://github.com/${{ github.repository }}/raw/main/unraid/nvidia-smi-exporter.plg
            ```

            **Prerequisite:** [Nvidia Driver plugin by ich777](https://github.com/ich777/unraid-nvidia-driver) must be installed first.
          files: |
            unraid/nvidia-smi-exporter.plg
            ${{ steps.pkgfiles.outputs.tgz }}
            ${{ steps.pkgfiles.outputs.md5 }}
